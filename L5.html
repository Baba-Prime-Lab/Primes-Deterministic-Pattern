<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Model 5: Selective Zigzag (Odd 21)</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .grid-container {
            display: grid;
            grid-template-columns: repeat(22, 42px); 
            background: #fff;
            border: 2px solid #2c3e50;
        }
        .cell {
            width: 42px; height: 35px;
            border: 0.1px solid #f0f0f0;
            display: flex; align-items: center; justify-content: center;
            font-size: 0.85rem; color: #bbb;
        }
        .hinge-col { background-color: #f9f9f9 !important; color: #333 !important; font-weight: bold; border: 1px solid #ddd; }
        
        /* الرؤوس الفردية: أزرق ثابت */
        .column-head-stable { background-color: #007bff !important; color: white !important; font-weight: bold; }

        /* الرؤوس الزوجية: وميض للإيحاء بالشطب */
        @keyframes blinkEffect {
            0% { opacity: 1; filter: grayscale(0); }
            50% { opacity: 0.2; filter: grayscale(1); } 
            100% { opacity: 1; filter: grayscale(0); }
        }
        .column-head-removable { 
            animation: blinkEffect 2s infinite ease-in-out;
            background-color: #007bff !important; 
            color: white !important; 
            font-weight: bold; 
        }

        .zero-blade { background-color: #000080 !important; color: #fff !important; font-weight: 900; border: 1.5px solid #d4af37; }
    </style>
</head>
<body>

    <h2 style="color:#2c3e50;">5. المتعرج الانتقائي (الفردي 21)</h2>
    <div id="grid" class="grid-container"></div>

    <script>
        const grid = document.getElementById('grid');
        const oddHeads = [1, 5, 11, 13, 17, 19]; // الفردية: تبقى ثابتة
        const evenHeads = [2, 4, 8, 10, 16, 20]; // الزوجية: تومض للشطب
        const zeroBlades = [3, 7];
        const rows = 10;
        const pLimit = 21;

        for (let r = 0; r < rows; r++) {
            let rowData = [];
            let startVal = r * pLimit;
            let endVal = (r + 1) * pLimit;

            if (r % 2 === 0) {
                for (let i = startVal; i <= endVal; i++) rowData.push(i);
            } else {
                for (let i = endVal; i >= startVal; i--) rowData.push(i);
            }

            rowData.forEach((num, index) => {
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.innerText = num;

                let colPos = (r % 2 === 0) ? index : (pLimit - index);

                if (index === 0 || index === pLimit) {
                    cell.classList.add('hinge-col');
                }
                
                if (num <= 7 && zeroBlades.includes(num)) {
                    cell.classList.add('zero-blade');
                } 
                // التحقق من نوع رأس العمود لتحديد شكل الحركة
                else if (oddHeads.includes(colPos)) {
                    cell.classList.add('column-head-stable');
                } 
                else if (evenHeads.includes(colPos)) {
                    cell.classList.add('column-head-removable');
                }

                grid.appendChild(cell);
            });
        }
    </script>
</body>
</html>
