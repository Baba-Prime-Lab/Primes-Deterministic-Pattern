<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Model 2: Folding Hinge Zigzag (p#30)</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .grid-container {
            display: grid;
            /* 31 عمود: عمود المفصلة اليسرى + 29 عمود وسطي + عمود المفصلة اليمنى */
            grid-template-columns: 45px repeat(29, 38px) 45px; 
            background: #fff;
            border: 2px solid #2c3e50;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        .cell {
            width: 100%; height: 35px;
            border: 0.1px solid #f0f0f0;
            display: flex; align-items: center; justify-content: center;
            font-size: 0.85rem; color: #bbb;
        }
        /* تمييز أعمدة المفاصل (الصفر والـ 30 ومضاعفاتهما) */
        .hinge-col { background-color: #fcfcfc !important; color: #333 !important; font-weight: bold; border: 1px solid #ddd; }
        .column-head { background-color: #007bff !important; color: white !important; font-weight: bold; }
        .zero-blade { background-color: #000080 !important; color: #fff !important; font-weight: 900; border: 1.5px solid #d4af37; }
    </style>
</head>
<body>

    <h2 style="color:#2c3e50;">2. Full Inverse Zigzag (Folding Hinge Model)</h2>
    
    <div class="grid-container" id="zigzag-grid"></div>

    <script>
        const grid = document.getElementById('zigzag-grid');
        const colHeads = [1, 7, 11, 13, 17, 19, 23, 29];
        const zeroBlades = [2, 3, 5];
        
        // مفاصل الطي (Hinges)
        const leftHinges = [0, 60, 60, 120, 120, 180, 180, 240, 240, 300];
        const rightHinges = [30, 30, 90, 90, 150, 150, 210, 210, 270, 270];

        for (let r = 0; r < 10; r++) {
            // 1. مفصلة اليسار
            const lCell = document.createElement('div');
            lCell.className = 'cell hinge-col';
            lCell.innerText = leftHinges[r];
            grid.appendChild(lCell);

            // 2. الأرقام الوسطية (من 1 إلى 29)
            let midNums = [];
            let rowBase = Math.floor(r / 2) * 60; // قاعدة حساب الصفوف للطي
            
            // منطق توليد الأرقام حسب اتجاه الصف
            if (r % 2 === 0) { // صف فردي (اتجاه لليمين)
                for (let i = 1; i <= 29; i++) midNums.push((r/2 * 60) + i);
            } else { // صف زوجي (اتجاه لليسار)
                for (let i = 29; i >= 1; i--) midNums.push((Math.floor(r/2) * 60) + 30 + i);
            }

            midNums.forEach((num) => {
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.innerText = num;

                // حساب موقع العمود الأصلي (1-29) للتلوين
                let pos = num % 30;
                if (pos === 0) pos = 30;

                if (r === 0 && zeroBlades.includes(num)) {
                    cell.classList.add('zero-blade');
                } else if (colHeads.includes(pos)) {
                    cell.classList.add('column-head');
                }
                grid.appendChild(cell);
            });

            // 3. مفصلة اليمين
            const rCell = document.createElement('div');
            rCell.className = 'cell hinge-col';
            rCell.innerText = rightHinges[r];
            grid.appendChild(rCell);
        }
    </script>
</body>
</html>
