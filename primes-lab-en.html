<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Baba-Prime Deterministic Lab</title>
    <style>
        :root { --primary: #2c3e50; --accent: #c0392b; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); margin: 0; }
        .container { max-width: 1400px; margin: 25px auto; padding: 0 20px; }
        
        /* Tabs System */
        .tabs-nav { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 25px; border-bottom: 2px solid #ddd; justify-content: center; }
        .tab-btn { padding: 12px 20px; cursor: pointer; border: none; background: #eee; border-radius: 6px 6px 0 0; font-weight: bold; transition: 0.3s; color: #555; }
        .tab-btn.active { background: var(--primary); color: gold; border-bottom: 4px solid var(--accent); }
        .tab-content { display: none; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 6px 20px rgba(0,0,0,0.06); min-height: 800px; }
        .tab-content.active { display: block; }

        /* Folders Styles (Hex & 105) */
        .cell-common { display: flex; align-items: center; justify-content: center; font-weight: bold; border: 1px solid #ddd; background: white; color: black; }
        .p-col-blue { background: #3498db !important; color: white !important; }
        .hinge-gold { background: #f1c40f !important; border: 1px solid #d4ac0d !important; }
        
        /* 15-Unit Styles */
        .cell-15 { width: 45px; height: 45px; font-size: 14px; }
        .h-15 { width: 22px; }
        
        /* 105-Unit Styles */
        .cell-105 { width: 12px; height: 35px; font-size: 7px; flex-shrink: 0; border: 0.1px solid #eee; }
        .h-105 { width: 6px; }

        /* Folding Animations */
        .f-unit { display: flex; transform-style: preserve-3d; transition: transform 2s cubic-bezier(0.4, 0, 0.2, 1); transform-origin: left center; }
        .is-folded-1 .f3-6, .s1 .f-15 { transform: rotateY(-180deg); }
        .is-folded-2 .f6-9, .s2 .f-30 { transform: rotateY(180deg); }
        .is-folded-3 .f9-12, .s3 .f-45 { transform: rotateY(-180deg); }
        .is-folded-4 .f12-15, .s4 .f-60 { transform: rotateY(180deg); }
        .s5 .f-75 { transform: rotateY(-180deg); }
        .s6 .f-90 { transform: rotateY(180deg); }

        .action-btn { padding: 10px 20px; cursor: pointer; background: var(--primary); color: white; border: none; border-radius: 6px; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div class="tabs-nav">
        <button class="tab-btn" onclick="openTab(event, 't1')">1. Probability</button>
        <button class="tab-btn" onclick="openTab(event, 't4')">4. Hex Folder</button>
        <button class="tab-btn" onclick="openTab(event, 't5')">5. 105 Folder</button>
        <button class="tab-btn active" onclick="openTab(event, 't8')">8. BaBa-ln x</button>
    </div>

    <!-- Tab 4: Hex Folder -->
    <div id="t4" class="tab-content">
        <div style="text-align: center;">
            <h2>15-Unit Hexagonal Folder</h2>
            <div style="display: flex; gap: 10px; justify-content: center; margin-bottom: 40px;">
                <button class="action-btn" onclick="toggleT4('is-folded-1')">Fold 3</button>
                <button class="action-btn" onclick="toggleT4('is-folded-2')">Fold 6</button>
                <button class="action-btn" onclick="toggleT4('is-folded-3')">Fold 9</button>
                <button class="action-btn" onclick="toggleT4('is-folded-4')">Fold 12</button>
                <button class="action-btn" onclick="resetT4()" style="background:#c0392b">Reset</button>
            </div>
            <div id="stage-hex" style="position:relative; height:600px; perspective:4000px;"></div>
        </div>
    </div>

    <!-- Tab 5: 105 Folder -->
    <div id="t5" class="tab-content">
        <div style="text-align: center;">
            <h2>105-Unit Primorial 5# Folder</h2>
            <div style="display: flex; gap: 8px; justify-content: center; margin-bottom: 30px; flex-wrap: wrap;">
                <button class="action-btn" onclick="toggleT5(1)">15</button><button class="action-btn" onclick="toggleT5(2)">30</button>
                <button class="action-btn" onclick="toggleT5(3)">45</button><button class="action-btn" onclick="toggleT5(4)">60</button>
                <button class="action-btn" onclick="toggleT5(5)">75</button><button class="action-btn" onclick="toggleT5(6)">90</button>
                <button class="action-btn" onclick="resetT5()" style="background:#c0392b">Reset</button>
            </div>
            <div id="stage-105" style="position:relative; height:700px; perspective:6000px; overflow:auto; background:#f9f9f9; border:1px solid #eee;"></div>
        </div>
    </div>

    <!-- Tab 8: BaBa-ln x -->
    <div id="t8" class="tab-content active">
        <div style="max-width: 700px; margin: auto;">
            <h2 style="text-align:center;">BaBa-ln x Refined Formula</h2>
            <div style="background: #eef2f7; padding: 20px; border-left: 5px solid #3498db; margin-bottom: 25px;">
                <p><strong>Note:</strong> At 10<sup>13</sup>, the error is reduced to <b>251.09</b> using precision factor <b>m</b>.</p>
            </div>
            <div style="border: 1px solid #ddd; padding: 30px; border-radius: 15px; text-align: center;">
                <label style="font-weight:bold;">Enter Value (X):</label><br>
                <input type="number" id="bx" value="10000000000000" oninput="calcBaba()" style="width: 80%; padding: 12px; margin: 20px 0; font-size: 1.3rem; text-align: center; border: 2px solid #3498db; border-radius: 8px;">
                <div style="display: flex; justify-content: space-around; background: #f9f9f9; padding: 15px; border-radius: 8px;">
                    <div>Lower: <br><b id="low" style="color:red">-</b></div>
                    <div>Upper: <br><b id="up" style="color:red">-</b></div>
                </div>
                <div style="margin-top: 25px; display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                    <div style="padding:15px; border:1px solid #eee; border-radius:8px;">Classical: <br><b id="cres">-</b></div>
                    <div style="padding:15px; border:2px solid #27ae60; border-radius:8px; background:#f2faf5;">BaBa Refined: <br><b id="bres" style="color:#27ae60">-</b></div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const p30 =;

    function openTab(e, n) {
        let c = document.getElementsByClassName("tab-content");
        for (let i of c) i.style.display = "none";
        let b = document.getElementsByClassName("tab-btn");
        for (let i of b) i.classList.remove("active");
        document.getElementById(n).style.display = "block";
        e.currentTarget.classList.add("active");
        if(n === 't4') initHex();
        if(n === 't5') init105();
    }

    function calcBaba() {
        const x = parseFloat(document.getElementById('bx').value);
        const m = 0.965345122765404763;
        const classic = x / Math.log(x);
        document.getElementById('cres').innerText = Math.round(classic).toLocaleString();
        document.getElementById('bres').innerText = Math.round(classic/m).toLocaleString();
        document.getElementById('low').innerText = Math.round(x-4175271).toLocaleString();
        document.getElementById('up').innerText = Math.round(x+2149284).toLocaleString();
    }

    function initHex() {
        const s = document.getElementById('stage-hex'); s.innerHTML = '';
        for (let r=0; r<9; r++) {
            const rw = document.createElement('div');
            rw.style.cssText = `position:absolute; top:${r*55}px; left:0; width:100%; display:flex; justify-content:center; transform-style:preserve-3d;`;
            let b = r*15;
            rw.innerHTML = `<div style="display:flex;transform-style:preserve-3d;"><div class="cell-common cell-15 h-15 hinge-gold">${b}</div><div class="cell-common cell-15 p-col-blue">${b+1}</div><div class="cell-common cell-15">${b+2}</div><div class="cell-common cell-15 h-15 hinge-gold">${b+3}</div><div class="f-unit f3-6"><div class="cell-common cell-15 h-15 hinge-gold">${b+3}</div><div class="cell-common cell-15">${b+4}</div><div class="cell-common cell-15 p-col-blue">${b+5}</div><div class="cell-common cell-15 h-15 hinge-gold">${b+6}</div><div class="f-unit f6-9"><div class="cell-common cell-15 h-15 hinge-gold">${b+6}</div><div class="cell-common cell-15 p-col-blue">${b+7}</div><div class="cell-common cell-15">${b+8}</div><div class="cell-common cell-15 h-15 hinge-gold">${b+9}</div><div class="f-unit f9-12"><div class="cell-common cell-15 h-15 hinge-gold">${b+9}</div><div class="cell-common cell-15">${b+10}</div><div class="cell-common cell-15 p-col-blue">${b+11}</div><div class="cell-common cell-15 h-15 hinge-gold">${b+12}</div><div class="f-unit f12-15"><div class="cell-common cell-15 h-15 hinge-gold">${b+12}</div><div class="cell-common cell-15 p-col-blue">${b+13}</div><div class="cell-common cell-15">${b+14}</div><div class="cell-common cell-15 h-15 hinge-gold">${b+15}</div></div></div></div></div></div>`;
            s.appendChild(rw);
        }
    }

    function init105() {
        const s = document.getElementById('stage-105'); s.innerHTML = '';
        for (let r=0; r<12; r++) {
            const rw = document.createElement('div');
            rw.style.cssText = `position:absolute; top:${r*45}px; left:20px; display:flex; transform-style:preserve-3d; transition:3s;`;
            let nums = []; for (let i=r*105; i<=r*105+105; i++) nums.push(i);
            if(r%2!==0) nums.reverse();
            let h = `<div class="f-unit">`;
            for (let j=0; j<7; j++) {
                let seg = nums.slice(j*15, j*15+16);
                if(j>0) h += `<div class="f-unit f-${j*15}">`;
                h += `<div class="cell-common cell-105 h-105 hinge-gold"></div>`;
                for (let k=1; k<15; k++) h += `<div class="cell-common cell-105 ${p30.includes(seg[k]%30)?'p-col-blue':''}">${seg[k]}</div>`;
                h += `<div class="cell-common cell-105 h-105 hinge-gold"></div>`;
            }
            h += `</div>`.repeat(7); rw.innerHTML = h; s.appendChild(rw);
        }
    }

    function toggleT4(c) { document.getElementById('t4').classList.toggle(c); }
    function resetT4() { document.getElementById('t4').className = 'tab-content active'; }
    function toggleT5(n) { document.getElementById('t5').classList.toggle('s'+n); }
    function resetT5() { let t=document.getElementById('t5'); for(let i=1; i<=6; i++) t.classList.remove('s'+i); }
    
    window.onload = calcBaba;
</script>
</body>
</html>
