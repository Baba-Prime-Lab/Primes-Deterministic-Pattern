<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deterministic Prime Pattern Lab</title>
    <style>
        :root { --primary: #2c3e50; --accent: #c0392b; --bg: #f4f7f6; --text: #333; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; }
        header { background: white; padding: 15px 5%; border-bottom: 2px solid #eee; display: flex; justify-content: space-between; }
        .container { max-width: 1400px; margin: 20px auto; padding: 0 20px; }
        
        /* تسيير التبويبات */
        .tabs-nav { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 20px; border-bottom: 2px solid #ddd; }
        .tab-btn { padding: 10px 15px; cursor: pointer; border: none; background: #eee; font-weight: bold; border-radius: 5px 5px 0 0; }
        .tab-btn.active { background: var(--primary); color: gold; border-bottom: 3px solid var(--accent); }
        .tab-content { display: none; background: white; padding: 20px; border-radius: 0 0 10px 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .tab-content.active { display: block; }

        /* تنسيق الشبكة (Grid) المشترك لجميع النماذج */
        .grid-matrix { display: grid; gap: 2px; margin-top: 20px; overflow: auto; background: #eee; padding: 10px; border-radius: 8px; }
        .cell { width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; background: white; font-size: 0.8rem; border-radius: 3px; }
        .prime { background: #27ae60; color: white; font-weight: bold; }
        .composite { color: #ccc; }
        
        .btn-group { display: flex; gap: 10px; margin-bottom: 15px; flex-wrap: wrap; }
        button.action-btn { padding: 8px 16px; cursor: pointer; background: var(--primary); color: white; border: none; border-radius: 4px; }
    </style>
</head>
<body>

<header>
    <div style="font-weight:bold; font-size:1.2rem;">Albaba & Baba Research Lab</div>
    <a href="../index.html" style="color:var(--accent); text-decoration:none;">← Back</a>
</header>

<div class="container">
    <!-- Main Tabs: شريط التنقل بين الأقسام الثمانية -->
    <div class="tabs-nav">
        <button class="tab-btn active" onclick="openTab(event, 't1')">1. Probability Columns</button>
        <button class="tab-btn" onclick="openTab(event, 't2')">2. Recurrence Property</button>
        <button class="tab-btn" onclick="openTab(event, 't3')">3. Folding Property</button>
        <button class="tab-btn" onclick="openTab(event, 't4')">4. Hexagonal Folder</button>
        <button class="tab-btn" onclick="openTab(event, 't5')">5. Primorial 5# Folder</button>
        <button class="tab-btn" onclick="openTab(event, 't6')">6. Mid-Real Folds</button>
        <button class="tab-btn" onclick="openTab(event, 't7')">7. Mid-Grid Folds</button>
        <button class="tab-btn" onclick="openTab(event, 't8')">8. BaBa-ln x Refined</button>
    </div>

    <!-- هنا تبدأ صناديق المحتوى (حيث سنلصق النماذج لاحقاً) -->
    <div id="t1" class="tab-content active"> <!-- محتوى التبويب الأول --> </div>
    <div id="t2" class="tab-content"> <!-- محتوى التبويب الثاني --> </div>
    <div id="t3" class="tab-content"> <!-- محتوى التبويب الثالث --> </div>
    <div id="t4" class="tab-content"> <!-- محتوى التبويب الرابع --> </div>
    <div id="t5" class="tab-content"> <!-- محتوى التبويب الخامس --> </div>
    <div id="t6" class="tab-content"> <!-- محتوى التبويب السادس --> </div>
    <div id="t7" class="tab-content"> <!-- محتوى التبويب السابع --> </div>
    <div id="t8" class="tab-content"> <!-- محتوى التبويب الثامن (معادلة بابا) --> </div>
</div>


    <!-- Tab 1: Probability -->
    <div id="t1" class="tab-content active">
        <h2>Probability Columns</h2>
        <p>Main explorer for deterministic prime distribution.</p>
        <!-- الصق كود نموذج الأعمدة هنا -->
    </div>

    <!-- Tab 2: Recurrence Systems (The 3 Models) -->
    <div id="t2" class="tab-content">
        <h2>Recurrence Property</h2>
        <div class="btn-group">
            <button class="action-btn" onclick="showSub('sub3')">3# (Base 6)</button>
            <button class="action-btn" onclick="showSub('sub5')">5# (Base 30)</button>
            <button class="action-btn" onclick="showSub('sub7')">7# (Base 210)</button>
        </div>
        
        <div id="sub3" class="sub-section">
            <h3>Hexagonal Recurrence (3#)</h3>
            <!-- الصق كود الـ 6n هنا -->
        </div>
        <div id="sub5" class="sub-section" style="display:none">
            <h3>Thirty System (5#)</h3>
            <!-- الصق كود الـ 30 هنا -->
        </div>
        <div id="sub7" class="sub-section" style="display:none">
            <h3>210 Unified Lab (7#)</h3>
            <!-- الصق كود الـ 210 هنا -->
        </div>
    </div>

    <!-- Tab 3: Folding Property -->
    <div id="t3" class="tab-content">
        <h2>Folding Property Model</h2>
        <!-- الصق كود المطوية الأولى هنا -->
    </div>

    <!-- Tab 4: Hexagonal Folder -->
    <div id="t4" class="tab-content">
        <h2>Hexagonal Folding Model</h2>
        <!-- الصق كود المطوية الثانية هنا -->
    </div>
</div>

<script>
    function openTab(evt, tabId) {
        let contents = document.getElementsByClassName("tab-content");
        for (let c of contents) c.classList.remove("active");
        let buttons = document.getElementsByClassName("tab-btn");
        for (let b of buttons) b.classList.remove("active");
        document.getElementById(tabId).classList.add("active");
        evt.currentTarget.classList.add("active");
    }

    function showSub(id) {
        let subs = document.getElementsByClassName("sub-section");
        for (let s of subs) s.style.display = "none";
        document.getElementById(id).style.display = "block";
    }

    // هنا تضع دوال الـ JavaScript الخاصة بكل نموذج (التي تولد المصفوفات)
</script>

</body>
</html>
