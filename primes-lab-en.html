<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deterministic Prime Pattern Lab</title>
    <style>
        :root { --primary: #2c3e50; --accent: #c0392b; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; }
        .container { max-width: 1400px; margin: 20px auto; padding: 20px; }
        
        /* Navigation Tabs */
        .tabs-nav { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 20px; border-bottom: 2px solid #ddd; }
        .tab-btn { padding: 12px 20px; cursor: pointer; border: none; background: #eee; font-weight: bold; border-radius: 8px 8px 0 0; }
        .tab-btn.active { background: var(--primary); color: gold; border-bottom: 3px solid var(--accent); }
        .tab-content { display: none; background: white; padding: 30px; border-radius: 0 0 12px 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); min-height: 800px; overflow: hidden; }
        .tab-content.active { display: block; }

        /* General UI Elements */
        .model-card { text-align: center; }
        .btn-group { display: flex; gap: 10px; justify-content: center; margin-bottom: 30px; flex-wrap: wrap; }
        .action-btn { padding: 10px 20px; cursor: pointer; background: var(--primary); color: white; border: none; border-radius: 6px; font-weight: bold; }
        
        /* CSS for Folder 15 (t4) */
        .cell-hex { width: 45px; height: 45px; background: white; color: black; display: flex; align-items: center; justify-content: center; font-weight: bold; border: 1px solid #ccc; font-size: 14px; box-sizing: border-box; }
        .p-col { background: #3498db !important; color: white !important; }
        .hng { background: #f1c40f !important; width: 22px; border: 1px solid #d4ac0d !important; }
        .is-folded-1 .f3-6 { transform: rotateY(-180deg); }
        .is-folded-2 .f6-9 { transform: rotateY(180deg); }
        .is-folded-3 .f9-12 { transform: rotateY(-180deg); }
        .is-folded-4 .f12-15 { transform: rotateY(180deg); }

        /* CSS for Folder 105 (t5) */
        .cell-105 { width: 12px; height: 35px; background: white; color: black; display: flex; align-items: center; justify-content: center; font-weight: bold; border: 0.1px solid #ddd; font-size: 7px; flex-shrink: 0; }
        .p-col-105 { background: #3498db !important; color: white !important; }
        .h-half { background: #f1c40f !important; width: 6px; border: 0.5px solid #d4ac0d; }
        .s1 .f-15 { transform: rotateY(-180deg); } 
        .s2 .f-30 { transform: rotateY(180deg); }  
        .s3 .f-45 { transform: rotateY(-180deg); } 
        .s4 .f-60 { transform: rotateY(180deg); }
        .s5 .f-75 { transform: rotateY(-180deg); }
        .s6 .f-90 { transform: rotateY(180deg); }
    </style>
</head>
<body>

<div class="container">
    <div class="tabs-nav">
        <button class="tab-btn" onclick="openTab(event, 't1')">1. Probability</button>
        <button class="tab-btn" onclick="openTab(event, 't2')">2. Recurrence</button>
        <button class="tab-btn" onclick="openTab(event, 't4')">4. Hex Folder</button>
        <button class="tab-btn" onclick="openTab(event, 't5')">5. 105 Folder</button>
        <button class="tab-btn active" onclick="openTab(event, 't8')">8. BaBa-ln x</button>
    </div>

    <!-- Tab 4: Hex Folder -->
    <div id="t4" class="tab-content">
        <div class="model-card">
            <h2>Hexagonal 15-Unit Folder</h2>
            <div class="btn-group">
                <button class="action-btn" onclick="toggleFold('is-folded-1')">Fold 3</button>
                <button class="action-btn" onclick="toggleFold('is-folded-2')">Fold 6</button>
                <button class="action-btn" onclick="toggleFold('is-folded-3')">Fold 9</button>
                <button class="action-btn" onclick="toggleFold('is-folded-4')">Fold 12</button>
                <button class="action-btn" onclick="resetFolds()" style="background:#c0392b">Reset</button>
            </div>
            <div id="stage-hex" style="position:relative; height:600px; perspective:4000px; display:flex; flex-direction:column; align-items:center;"></div>
        </div>
    </div>

    <!-- Tab 5: 105 Folder -->
    <div id="t5" class="tab-content">
        <div class="model-card">
            <h2>105-Unit Zigzag Folder</h2>
            <div class="btn-group">
                <button class="action-btn" onclick="toggleS(1)">15</button>
                <button class="action-btn" onclick="toggleS(2)">30</button>
                <button class="action-btn" onclick="toggleS(3)">45</button>
                <button class="action-btn" onclick="toggleS(4)">60</button>
                <button class="action-btn" onclick="toggleS(5)">75</button>
                <button class="action-btn" onclick="toggleS(6)">90</button>
                <button class="action-btn" onclick="resetS()" style="background:#c0392b">Reset</button>
            </div>
            <div id="stage-105" style="position:relative; height:700px; perspective:6000px; overflow:auto; background:#f9f9f9; padding:20px;"></div>
        </div>
    </div>

    <!-- Tab 8: BaBa Lab -->
    <div id="t8" class="tab-content active">
        <div class="model-card">
            <h2>BaBa-ln x Refined Formula</h2>
            <div style="background:#eef2f7; padding:20px; border-left:5px solid #3498db; text-align:left; margin-bottom:20px;">
                <p><strong>Scientific Insight:</strong> This formula reduces error at 10<sup>13</sup> to just <b>251.09</b> using factor <b>m</b>.</p>
            </div>
            <div style="max-width:500px; margin:auto; border:1px solid #ddd; padding:30px; border-radius:15px;">
                <label>Enter X Value:</label><br>
                <input type="number" id="baba-x" value="10000000000000" style="width:100%; padding:10px; margin:15px 0; font-size:1.2rem; text-align:center;">
                <button class="action-btn" style="width:100%;" onclick="calculateBaba()">Calculate Precision</button>
                <div style="margin-top:20px; text-align:left;">
                    <p>Lower Limit: <b id="low-l" style="color:red">-</b></p>
                    <p>Upper Limit: <b id="up-l" style="color:red">-</b></p>
                    <hr>
                    <p>Classical (x/ln x): <b id="c-res">-</b></p>
                    <p>BaBa Refined: <b id="b-res" style="color:green">-</b></p>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const p30 =;

    function openTab(evt, name) {
        let contents = document.getElementsByClassName("tab-content");
        for (let c of contents) c.style.display = "none";
        let btns = document.getElementsByClassName("tab-btn");
        for (let b of btns) b.classList.remove("active");
        document.getElementById(name).style.display = "block";
        evt.currentTarget.classList.add("active");
        if(name === 't4') initHex();
        if(name === 't5') init105();
    }

    function calculateBaba() {
        const x = parseFloat(document.getElementById('baba-x').value);
        const m = 0.965345122765404763;
        const classic = x / Math.log(x);
        document.getElementById('c-res').innerText = Math.round(classic).toLocaleString();
        document.getElementById('b-res').innerText = Math.round(classic/m).toLocaleString();
        document.getElementById('low-l').innerText = Math.round(x-4175271).toLocaleString();
        document.getElementById('up-l').innerText = Math.round(x+2149284).toLocaleString();
    }

    function initHex() {
        const stage = document.getElementById('stage-hex'); stage.innerHTML = '';
        for (let r=0; r<9; r++) {
            const row = document.createElement('div');
            row.style.cssText = `position:absolute; top:${r*55}px; display:flex; transform-style:preserve-3d;`;
            let b = r*15;
            row.innerHTML = `<div style="display:flex;transform-style:preserve-3d;"><div class="cell-hex hng">${b}</div><div class="cell-hex p-col">${b+1}</div><div class="cell-hex">${b+2}</div><div class="cell-hex hng">${b+3}</div><div class="f3-6" style="display:flex;transform-style:preserve-3d;transition:1.5s;transform-origin:left;"><div class="cell-hex hng">${b+3}</div><div class="cell-hex">${b+4}</div><div class="cell-hex p-col">${b+5}</div><div class="cell-hex hng">${b+6}</div><div class="f6-9" style="display:flex;transform-style:preserve-3d;transition:1.5s;transform-origin:left;"><div class="cell-hex hng">${b+6}</div><div class="cell-hex p-col">${b+7}</div><div class="cell-hex">${b+8}</div><div class="cell-hex hng">${b+9}</div><div class="f9-12" style="display:flex;transform-style:preserve-3d;transition:1.5s;transform-origin:left;"><div class="cell-hex hng">${b+9}</div><div class="cell-hex">${b+10}</div><div class="cell-hex p-col">${b+11}</div><div class="cell-hex hng">${b+12}</div><div class="f12-15" style="display:flex;transform-style:preserve-3d;transition:1.5s;transform-origin:left;"><div class="cell-hex hng">${b+12}</div><div class="cell-hex p-col">${b+13}</div><div class="cell-hex">${b+14}</div><div class="cell-hex hng">${b+15}</div></div></div></div></div></div>`;
            stage.appendChild(row);
        }
    }

    function init105() {
        const stage = document.getElementById('stage-105'); stage.innerHTML = '';
        for (let r=0; r<12; r++) {
            const row = document.createElement('div');
            row.style.cssText = `position:absolute; top:${r*45}px; left:20px; display:flex; transform-style:preserve-3d; transition:2s;`;
            let nums = []; for (let i=r*105; i<=r*105+105; i++) nums.push(i);
            if(r%2!==0) nums.reverse();
            let html = `<div style="display:flex;transform-style:preserve-3d;">`;
            for (let s=0; s<7; s++) {
                let seg = nums.slice(s*15, s*15+16);
                if(s>0) html += `<div class="f-unit f-${s*15}" style="display:flex;transform-style:preserve-3d;transition:2s;transform-origin:left;">`;
                html += `<div class="h-half"></div>`;
                for (let i=1; i<15; i++) html += `<div class="cell-105 ${p30.includes(seg[i]%30)?'p-col-105':''}">${seg[i]}</div>`;
                html += `<div class="h-half"></div>`;
            }
            html += `</div>`.repeat(7);
            row.innerHTML = html; stage.appendChild(row);
        }
    }

    function toggleFold(c) { document.getElementById('t4').classList.toggle(c); }
    function resetFolds() { document.getElementById('t4').className = 'tab-content active'; }
    function toggleS(n) { document.getElementById('t5').classList.toggle('s'+n); }
    function resetS() { let t=document.getElementById('t5'); for(let i=1; i<=6; i++) t.classList.remove('s'+i); }
    
    window.onload = calculateBaba;
</script>
</body>
</html>
