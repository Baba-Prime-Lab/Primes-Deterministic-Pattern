<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Legendre's Conjecture | BaBa-LnX Lab</title>
    <style>
        :root { --gold: #b8860b; --bg: #0f172a; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; text-align: center; }
        
        .nav-bar { background: rgba(0,0,0,0.5); padding: 20px; position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid var(--gold); }
        .nav-btn { 
            padding: 10px 20px; margin: 5px; background: none; border: 1px solid var(--gold); 
            color: var(--gold); cursor: pointer; border-radius: 5px; transition: 0.3s; font-weight: bold;
        }
        .nav-btn:hover, .nav-btn.active { background: var(--gold); color: black; }

        .lab-container { width: 100%; height: 85vh; border: none; margin-top: 10px; }
        
        .header-info { padding: 20px; background: rgba(184, 134, 11, 0.1); }
    </style>
</head>
<body>

<div class="nav-bar">
    <div style="margin-bottom: 15px; font-weight: bold; color: var(--gold);">LEGENDRE PROOF EXPLORER</div>
    <button class="nav-btn" onclick="loadModel('L9', this, '4, 9')">Phase 1: [4 - 9]</button>
    <button class="nav-btn" onclick="loadModel('L10', this, '9, 16, 25')">Phase 2: [9 - 25]</button>
    <button class="nav-btn" onclick="loadModel('L11', this, '25, 36, 49')">Phase 3: [25 - 49]</button>
    <button class="nav-btn" onclick="loadModel('L2310', this, '49, 64, 81, 100, 121')">Phase 4: [49 - 121]</button>
    <a href="proofs_hub.html" style="text-decoration:none;"><button class="nav-btn" style="border-color:#e74c3c; color:#e74c3c;">Back</button></a>
</div>

<div class="header-info" id="info-text">
    Select a phase to visualize the deterministic prime guarantee between n² and (n+1)²
</div>

<iframe id="model-frame" class="lab-container" src=""></iframe>

<script>
    function loadModel(modelId, btn, range) {
        // تحديث الأزرار
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        
        // تحديث النص
        document.getElementById('info-text').innerText = "Visualizing Range: [" + range + "] via " + modelId + " Deterministic Architecture";
        
        // تحميل النموذج (سنقوم بتعديل ملفات L9, L10.. لاستقبال أوامر الوهج)
        const frame = document.getElementById('model-frame');
        frame.src = modelId + ".html?glow=" + range;
    }
</script>
</body>
</html>
