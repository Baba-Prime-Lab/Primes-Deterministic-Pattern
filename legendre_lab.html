<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Legendre's Conjecture | BaBa-LnX Lab</title>
    <style>
        :root { --gold: #b8860b; --bg: #0f172a; --nav: rgba(15, 23, 42, 0.9); }
        body { 
            margin: 0; 
            font-family: 'Segoe UI', Tahoma, sans-serif; 
            background: var(--bg); 
            color: white; 
            text-align: center;
            overflow: hidden; /* لمنع ظهور شريطين للتمرير */
        }
        
        .nav-bar { 
            background: var(--nav); 
            padding: 15px; 
            position: relative;
            z-index: 1000; 
            border-bottom: 2px solid var(--gold);
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }

        .nav-btn { 
            padding: 10px 18px; 
            margin: 5px; 
            background: transparent; 
            border: 1px solid var(--gold); 
            color: var(--gold); 
            cursor: pointer; 
            border-radius: 5px; 
            transition: 0.3s; 
            font-weight: bold;
            font-size: 0.9rem;
        }

        .nav-btn:hover, .nav-btn.active { 
            background: var(--gold); 
            color: white; 
            box-shadow: 0 0 15px rgba(184, 134, 11, 0.4);
        }

        .header-info { 
            padding: 15px; 
            background: rgba(184, 134, 11, 0.1); 
            font-size: 1rem;
            border-bottom: 1px solid rgba(184, 134, 11, 0.2);
        }

        /* حاوية الـ iframe لضمان الظهور */
        .lab-viewport {
            width: 100%;
            height: calc(100vh - 160px); /* حساب المساحة المتبقية بدقة */
            border: none;
            background: white; /* خلفية بيضاء مؤقتة للتأكد من التحميل */
        }
    </style>
</head>
<body>

<div class="nav-bar">
    <div style="margin-bottom: 10px; font-weight: bold; color: var(--gold); letter-spacing: 1px;">LEGENDRE PROOF EXPLORER</div>
    
    <button class="nav-btn" onclick="loadModel('PL1', this, '9, 16, 25')">Phase 1: [9-25]</button>
    <button class="nav-btn" onclick="loadModel('PL2', this, '25, 36, 49')">Phase 2: [25-49]</button>
    <button class="nav-btn" onclick="loadModel('PL3', this, '49, 64, 81, 100, 121')">Phase 3: [49-121]</button>
    <button class="nav-btn" onclick="loadModel('PL4', this, '121, 144, 169')">Phase 4: [121-169]</button>
    
    <a href="proofs_hub.html" style="text-decoration:none;">
        <button class="nav-btn" style="border-color:#e74c3c; color:#e74c3c;">← Back</button>
    </a>
</div>

<div class="header-info" id="info-text">
    Welcome to the Deterministic Lab. Please select a phase.
</div>

<!-- التأكد من وجود الـ id الصحيح للاستدعاء -->
<iframe id="model-frame" class="lab-viewport" src="PL1.html"></iframe>

<script>
    function loadModel(modelId, btn, range) {
        // 1. تحديث الأزرار
        const buttons = document.querySelectorAll('.nav-btn');
        buttons.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        
        // 2. تحديث النص
        document.getElementById('info-text').innerText = "Visualizing Range: [" + range + "] via " + modelId + " Deterministic Model";
        
        // 3. تغيير مسار الـ iframe
        const frame = document.getElementById('model-frame');
        frame.src = modelId + ".html";
        
        console.log("Loading model: " + modelId + ".html"); // للتأكد من عمل الدالة في الكونسول
    }

    // تحميل المرحلة الأولى تلقائياً عند فتح الصفحة لضمان عدم ظهورها بيضاء
    window.onload = function() {
        const firstBtn = document.getElementsByClassName('nav-btn')[0];
        if(firstBtn) loadModel('PL1', firstBtn, '9, 16, 25');
    };
</script>

</body>
</html>
