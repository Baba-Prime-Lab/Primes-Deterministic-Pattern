<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>GOLD2: Progressive Reveal</title>
    <style>
        :root { 
            --bg: #ffffff; --text: #0f172a; --gold: #b8860b; 
            --silver: #94a3b8; --match-glow: #10b981; 
            --navy-loss: #1e3a8a; --red-gain: #e11d48;
        }
        body { background: var(--bg); font-family: 'Segoe UI', sans-serif; padding: 20px; color: var(--text); }
        .header-section { width: 100%; border-bottom: 2px solid var(--silver); margin-bottom: 20px; }
        .controls { display: flex; gap: 10px; margin: 15px 0; }
        .btn-logic { padding: 10px 15px; cursor: pointer; border-radius: 8px; font-weight: bold; border: 2px solid var(--silver); text-transform: uppercase; font-size: 0.8rem; transition: 0.3s; }
        .active-btn { background: #0f172a !important; color: white !important; border-color: #0f172a; }
        
        .matrix-container { display: flex; flex-direction: column; gap: 30px; }
        .even-block { background: #fff; padding: 15px; border-radius: 12px; border: 1px solid #e2e8f0; overflow-x: auto; }
        
        .counter-bar { 
            display: flex; gap: 15px; margin-bottom: 10px; font-size: 0.85rem; 
            background: #f8fafc; padding: 8px; border-radius: 6px; border: 1px dashed var(--silver);
            white-space: nowrap; animation: fadeIn 0.5s ease;
        }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .stat { font-weight: bold; }
        .stat-navy { color: var(--navy-loss); }
        .stat-red { color: var(--red-gain); }
        .stat-match { color: var(--match-glow); }

        .row-wrapper { display: flex; gap: 0; margin-bottom: 0; }
        .cell { 
            width: 32px; height: 32px; 
            display: flex; align-items: center; justify-content: center; 
            font-size: 0.75rem; font-weight: bold; 
            border: 0.5px solid #e2e8f0; 
            box-sizing: border-box; 
            flex-shrink: 0; 
            transition: 0.3s;
        }
        .long-num { font-size: 0.55rem !important; }

        .matched { background: var(--match-glow) !important; color: white; border-color: transparent; }
        .navy-cell { background: var(--navy-loss) !important; color: white; border-color: transparent; }
        .red-cell { background: var(--red-gain) !important; color: white; border-color: transparent; }
    </style>
</head>
<body>

    <div class="header-section">
        <h2 style="margin:0;">Goldbach Phase II: Progressive Symmetry Analysis</h2>
        <div class="controls">
            <button class="btn-logic" id="btn-none" onclick="render('none')">Numbers Only</button>
            <button class="btn-logic" id="btn-diff" onclick="render('diff')">Row Primes Difference</button>
            <a href="GOLD.hub.html" style="text-decoration:none; padding:10px 15px; background:var(--gold); color:white; border-radius:8px; font-weight:bold; font-size:0.8rem;">← HUB</a>
        </div>
    </div>

    <div id="main-display" class="matrix-container"></div>

    <script>
        const evens = [6, 12, 18, 24, 30, 60, 90, 120, 150, 180, 210];

        function isP(n) {
            if (n < 2) return false;
            if (n === 2 || n === 3) return true;
            if (n % 2 === 0 || n % 3 === 0) return false;
            for (let i = 5; i * i <= n; i += 6) {
                if (n % i === 0 || n % (i + 2) === 0) return false;
            }
            return true;
        }

        function createCell(val) {
            const c = document.createElement('div');
            c.className = 'cell';
            if (val >= 100) c.classList.add('long-num');
            c.innerText = val;
            return c;
        }

        function render(mode) {
            const display = document.getElementById('main-display');
            display.innerHTML = "";
            
            // تحديث حالة الأزرار
            document.querySelectorAll('.btn-logic').forEach(b => b.classList.remove('active-btn'));
            document.getElementById('btn-' + mode).classList.add('active-btn');
            
            evens.forEach(E => {
                let countNavy = 0, countRed = 0, countPairs = 0;
                const block = document.createElement('div');
                block.className = 'even-block';
                const mid = Math.floor(E / 2);

                const r1 = document.createElement('div'); r1.className = 'row-wrapper';
                const r2 = document.createElement('div'); r2.className = 'row-wrapper';

                for (let x = 0; x <= mid; x++) {
                    const v1 = x, v2 = E - x;
                    const c1 = createCell(v1);
                    const c2 = createCell(v2);

                    if (mode === 'diff') {
                        const p1 = isP(v1), p2 = isP(v2);
                        if (p1 && p2) {
                            c1.classList.add('matched'); c2.classList.add('matched');
                            countPairs++;
                        } else if (p1 && !p2) {
                            c2.classList.add('navy-cell');
                            countNavy++;
                        } else if (!p1 && p2) {
                            c1.classList.add('red-cell');
                            countRed++;
                        }
                    }
                    r1.appendChild(c1); r2.appendChild(c2);
                }

                // العداد يظهر فقط في وضع Diff
                let headerContent = `<div class="stat" style="margin-bottom:10px;">Factor: ${E}</div>`;
                if (mode === 'diff') {
                    headerContent = `
                    <div class="counter-bar">
                        <span class="stat">E: ${E}</span> |
                        <span class="stat stat-match">Pairs: ${countPairs}</span> |
                        <span class="stat stat-navy">Navy Loss (-): ${countNavy}</span> |
                        <span class="stat stat-red">Red Gain (+): ${countRed}</span> |
                        <span class="stat" style="color:var(--gold)">Net Surplus: ${countPairs + countRed - countNavy}</span>
                    </div>`;
                }

                block.innerHTML = headerContent;
                block.appendChild(r1);
                block.appendChild(r2);
                display.appendChild(block);
            });
        }

        // البدء بالأرقام فقط للتشويق
        render('none');
    </script>
</body>
</html>
