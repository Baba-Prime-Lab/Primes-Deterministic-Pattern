<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>Deterministic Pattern Lab - Raw Models</title>
    <style>
        /* التنسيق الأصلي الصارم */
        body { background: #050505; color: gold; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; }
        h1, h2 { color: gold; text-align: center; }
        
        .model-section { margin-bottom: 100px; width: 100%; display: flex; flex-direction: column; align-items: center; border-bottom: 1px solid #333; padding-bottom: 50px; }
        
        /* إعدادات المسرح (Stage) للمطويتين */
        .stage-15 { position: relative; width: 1000px; height: 600px; perspective: 4000px; margin-top: 20px; }
        .stage-105 { position: relative; width: 1400px; height: 700px; perspective: 6000px; margin-top: 20px; }

        .row-container { position: absolute; display: flex; transform-style: preserve-3d; transition: 3s; justify-content: center; }
        .f-unit { display: flex; transform-style: preserve-3d; transition: transform 2.2s cubic-bezier(0.4, 0, 0.2, 1); transform-origin: left center; }
        
        .cell { width: 55px; height: 55px; background: white; color: black; display: flex; align-items: center; justify-content: center; font-weight: bold; border: 1px solid #000; font-size: 16px; box-sizing: border-box; }
        .cell-105 { width: 10px; height: 35px; font-size: 6px; border: 0.1px solid #333; }

        .prime-col { background: #00bcd4 !important; color: white !important; }
        .hinge { background: #ffcc00 !important; width: 27.5px; border: 1.5px solid #856404; }
        .hinge-half { background: #ffcc00 !important; width: 5px; border: 0.5px solid #856404; }

        /* منطق طي الـ 15 */
        .fold-15-1 .f15-3 { transform: rotateY(-180deg); }
        .fold-15-2 .f15-6 { transform: rotateY(180deg); }
        .fold-15-3 .f15-9 { transform: rotateY(-180deg); }
        .fold-15-4 .f15-12 { transform: rotateY(180deg); }

        /* منطق طي الـ 105 */
        .s1 .f-15 { transform: rotateY(-180deg); } 
        .s2 .f-30 { transform: rotateY(180deg); }  
        .s3 .f-45 { transform: rotateY(-180deg); } 
        .s4 .f-60 { transform: rotateY(180deg); }
        .s5 .f-75 { transform: rotateY(-180deg); }
        .s6 .f-90 { transform: rotateY(180deg); }

        .btn-group { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; justify-content: center; position: sticky; top: 10px; z-index: 1000; }
        button { padding: 10px 20px; cursor: pointer; background: gold; font-weight: bold; border-radius: 50px; border: none; }
    </style>
</head>
<body>

    <!-- قسم مطوية الـ 15 -->
    <div class="model-section" id="sec-15">
        <h2>Hexagonal Folder (15 Units)</h2>
        <div class="btn-group">
            <button onclick="document.body.classList.toggle('fold-15-1')">طي (3)</button>
            <button onclick="document.body.classList.toggle('fold-15-2')">طي (6)</button>
            <button onclick="document.body.classList.toggle('fold-15-3')">طي (9)</button>
            <button onclick="document.body.classList.toggle('fold-15-4')">طي (12)</button>
        </div>
        <div class="stage-15" id="stage15"></div>
    </div>

    <!-- قسم مطوية الـ 105 -->
    <div class="model-section" id="sec-105">
        <h2>Primorial 5# Folder (105 Units)</h2>
        <div class="btn-group">
            <button onclick="toggleS(1)">15</button><button onclick="toggleS(2)">30</button>
            <button onclick="toggleS(3)">45</button><button onclick="toggleS(4)">60</button>
            <button onclick="toggleS(5)">75</button><button onclick="toggleS(6)">90</button>
        </div>
        <div class="stage-105" id="stage105"></div>
    </div>

    <script>
        // --- بناء مطوية الـ 15 ---
        const st15 = document.getElementById('stage15');
        for (let r = 0; r < 6; r++) {
            const row = document.createElement('div');
            row.className = 'row-container';
            row.style.top = (r * 65) + 'px';
            let b = r * 15;
            row.innerHTML = `
                <div class="f-unit">
                    <div class="cell hinge">${b+0}</div><div class="cell prime-col">${b+1}</div><div class="cell">${b+2}</div><div class="cell hinge">${b+3}</div>
                    <div class="f-unit f15-3">
                        <div class="cell hinge">${b+3}</div><div class="cell">${b+4}</div><div class="cell prime-col">${b+5}</div><div class="cell hinge">${b+6}</div>
                        <div class="f-unit f15-6">
                            <div class="cell hinge">${b+6}</div><div class="cell prime-col">${b+7}</div><div class="cell">${b+8}</div><div class="cell hinge">${b+9}</div>
                            <div class="f-unit f15-9">
                                <div class="cell hinge">${b+9}</div><div class="cell">${b+10}</div><div class="cell prime-col">${b+11}</div><div class="cell hinge">${b+12}</div>
                                <div class="f-unit f15-12">
                                    <div class="cell hinge">${b+12}</div><div class="cell prime-col">${b+13}</div><div class="cell">${b+14}</div><div class="cell hinge">${b+15}</div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>`;
            st15.appendChild(row);
        }

        // --- بناء مطوية الـ 105 ---
        const st105 = document.getElementById('stage105');
        const isPrimeCol = (n) => [1, 7, 11, 13, 17, 19, 23, 29].includes(n % 30);
        function toggleS(n) { document.body.classList.toggle('s' + n); }

        for (let r = 0; r < 10; r++) {
            const row = document.createElement('div');
            row.className = 'row-container';
            row.style.top = (r * 45) + 'px';
            let rowNums = [];
            for (let i = r*105; i <= (r+1)*105; i++) rowNums.push(i);
            if (r % 2 !== 0) rowNums.reverse();

            let html = `<div class="f-unit base">`;
            for (let s = 0; s < 7; s++) {
                let segmentNums = rowNums.slice(s * 15, (s * 15) + 16);
                if (s > 0) html += `<div class="f-unit f-${s * 15}">`;
                html += `<div class="hinge-half"></div>`;
                for (let i = 1; i < 15; i++) {
                    let num = segmentNums[i];
                    html += `<div class="cell cell-105 ${isPrimeCol(num) ? "prime-col" : ""}">${num}</div>`;
                }
                html += `<div class="hinge-half"></div>`;
            }
            html += `</div>`.repeat(7);
            row.innerHTML = html;
            st105.appendChild(row);
        }
    </script>
</body>
</html>
