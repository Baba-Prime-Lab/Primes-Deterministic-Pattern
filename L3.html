<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Model 3: Centered Model (30 Columns Optimized)</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .grid-container {
            display: grid;
            /* 30 عمود بالضبط: يبدأ من -14 وينتهي عند +15 */
            grid-template-columns: repeat(30, 40px); 
            background: #fff;
            border: 2px solid #2c3e50;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        .cell {
            width: 40px; height: 35px;
            border: 0.1px solid #f0f0f0;
            display: flex; align-items: center; justify-content: center;
            font-size: 0.85rem; color: #bbb;
        }
        /* العمود المركزي (0, 30, 60...) */
        .zero-center { 
            background-color: #2c3e50 !important; 
            color: #d4af37 !important; 
            font-weight: bold;
        }
        /* رؤوس الأعمدة (ColumN HeaDs) */
        .column-head { background-color: #007bff !important; color: white !important; font-weight: bold; }
        /* التوائم حول الصفر (1, -1) */
        .potential-twins { border: 2px solid #d4af37 !important; color: #333 !important; font-weight: bold; }
    </style>
</head>
<body>

    <h2 style="color:#2c3e50;">3. Centered Model (p#30 - Balanced)</h2>
    <p>Range: [-14 to +15] | Focus: Primitive Gap & Potential Twins</p>
    
    <div class="grid-container" id="centered-grid"></div>

    <script>
        const grid = document.getElementById('centered-grid');
        const colHeads = [1, 7, 11, 13, 17, 19, 23, 29];
        const rows = 10;

        for (let r = 0; r < rows; r++) {
            let centerPoint = r * 30; // نقاط الارتكاز (الصفر، الثلاثين...)
            
            // نبدأ من -14 إلى +15 ليكون المجموع 30 خلية
            for (let i = -14; i <= 15; i++) {
                const currentNum = centerPoint + i;
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.innerText = currentNum;

                // 1. تمييز العمود المركزي (الصفر ومضاعفاته)
                if (i === 0) {
                    cell.classList.add('zero-center');
                }
                
                // 2. تلوين أعمدة الاحتمالات
                let checkVal = currentNum % 30;
                if (checkVal < 0) checkVal += 30;
                if (checkVal === 0) checkVal = 30;

                if (colHeads.includes(checkVal)) {
                    cell.classList.add('column-head');
                }

                // 3. تمييز التوائم {1, -1}
                if (Math.abs(i) === 1) {
                    cell.classList.add('potential-twins');
                }

                grid.appendChild(cell);
            }
        }
    </script>
</body>
</html>
