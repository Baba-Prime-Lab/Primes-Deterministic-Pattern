<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>BaBa-LnX Precision Hub</title>
    <style>
        :root { --bg-light: #f4f7f6; --sidebar: #ffffff; --accent: #2c3e50; --gold: #b8860b; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg-light); margin: 0; display: flex; height: 100vh; overflow: hidden; }
        #left-sidebar { width: 320px; background: var(--sidebar); padding: 20px; border-right: 1px solid #ddd; overflow-y: auto; }
        .menu-title { color: var(--accent); border-bottom: 2px solid var(--gold); padding-bottom: 5px; margin-top: 15px; font-size: 0.9rem; }
        .branch-btn { width: 100%; background: #fff; border: 1px solid #eee; padding: 10px; margin-bottom: 5px; border-radius: 4px; cursor: pointer; text-align: left; font-size: 0.8rem; transition: 0.3s; }
        .branch-btn:hover { background: var(--accent); color: #fff; }
        #main-stage { flex-grow: 1; padding: 30px; display: flex; flex-direction: column; align-items: center; overflow-y: auto; }
        .explanation-box { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); max-width: 800px; width: 100%; min-height: 400px; }
        .visual-btn { margin-top: 25px; padding: 12px 30px; background: var(--gold); color: white; border: none; border-radius: 20px; cursor: pointer; font-weight: bold; }
        #right-sidebar { width: 250px; background: var(--sidebar); padding: 20px; border-left: 1px solid #ddd; order: 2; }
        .papa-btn { background: var(--accent); color: white; width: 100%; padding: 12px; border: none; border-radius: 6px; font-weight: bold; margin-bottom: 15px; }
        .insight-card { border: 1px solid var(--gold); padding: 12px; font-size: 0.8rem; background: #fff; }
    </style>
</head>
<body>

    <!-- الجهة اليسرى: 13 زرًا بالترتيب الجديد -->
    <div id="left-sidebar">
        <h3 class="menu-title">Probability Column Models</h3>
        <button class="branch-btn" onclick="updateView('1')">1. Sequential Order Model (p#30)</button>
        <button class="branch-btn" onclick="updateView('2')">2. Full Inverse Zigzag</button>
        <button class="branch-btn" onclick="updateView('3')">3. Centered Model (±1)</button>
        <button class="branch-btn" onclick="updateView('4')">4. Half-Inverse Zigzag</button>
        <button class="branch-btn" onclick="updateView('5')">5. Selective Zigzag (Odd 21)</button>

        <h3 class="menu-title">Theoretical Recurrence</h3>
        <button class="branch-btn" onclick="updateView('6')">6. Recurrence: Model (2×3) & (3×2)</button>
        <button class="branch-btn" onclick="updateView('7')">7. Recurrence: Model (2×7) & (7×2)</button>
        <button class="branch-btn" onclick="updateView('8')">8. Recurrence: Redundant Table 18</button>

        <h3 class="menu-title">Activated Primorial Tables</h3>
        <button class="branch-btn" onclick="updateView('9')">9. Activated Hexagonal (p#6)</button>
        <button class="branch-btn" onclick="updateView('10')">10. Activated Trigonal (p#30)</button>
        <button class="branch-btn" onclick="updateView('11')">11. Activated 7# Primorial (p#210)</button>

        <h3 class="menu-title">Mechanical Folders</h3>
        <button class="branch-btn" onclick="updateView('12')">12. Hexagonal 15-Unit Folder</button>
        <button class="branch-btn" onclick="updateView('13')">13. Primorial 105-Unit Folder</button>
    </div>

    <!-- العرض المركزي -->
    <div id="main-stage">
        <div id="content-area" class="explanation-box">
            <h2 style="text-align:center;">BaBa-LnX Interactive Hub</h2>
            <p style="text-align:center;">Select a model to begin.</p>
        </div>
    </div>

    <!-- الجهة اليمنى -->
    <div id="right-sidebar">
        <button class="papa-btn" onclick="loadExternalModel('R1.html')">BaBa-LnX</button>

        <div class="insight-card">
            <strong>Scientific Insight:</strong><br><br>
            Zero Statistical Error range:<br>
            <strong>[ 10<sup>n</sup> ± 2√10<sup>n</sup> ]</strong>
        </div>
    </div>

    <script>
       const contentData = {
    '1': { title: "1. Sequential Order Model (p#30)", text: "Visualizes the fundamental 8 potential columns of p#30 in a linear structure." },
    '2': { title: "2. Full Inverse Zigzag", text: "Demonstrates mirror symmetry and twin gaps via total row reversal." },
    '3': { title: "3. Centered Model (±1)", text: "Focuses on the Primitive Gap and potential twins {1, -1} around the Zero Point." },
    '4': { title: "4. Half-Inverse Zigzag", text: "The foundation of aesthetic column alignment via half-mark reversal." },
    '5': { title: "5. Selective Zigzag (Odd 21)", text: "Features the 'Half-Cell Shift' necessary for odd primorial column consistency." },
    '6': { title: "6. Recurrence: Model (2×3) & (3×2)", text: "Theoretical basis of combining units to form p#6." },
    '7': { title: "7. Recurrence: Model (2×7) & (7×2)", text: "Generation of trigonal structures and φ(M) logic." },
    '8': { title: "8. Recurrence: Redundant Table 18", text: "Demonstrates redundancy in higher primorial stages." },
    '9': { title: "9. Activated Hexagonal (p#6)", text: "p#6 table with ZeRo BlAdEs (2, 3) activated." },
    '10': { title: "10. Activated Trigonal (p#30)", text: "p#30 table with ZeRo BlAdEs (2, 3, 5) activated." },
    '11': { title: "11. Activated 7# (p#210)", text: "Higher-order determinism with p#210 structure." },
    '12': { title: "12. Hexagonal 15-Unit Folder", text: "Mechanical 3D folding at 3-unit intervals." },
    '13': { title: "13. Primorial 105-Unit Folder", text: "Structural symmetry folding up to 105 units." }
};

// دالة تحديث الشرح مع زر "Launch" الذي يفتح ملفات L
function updateView(id) {
    const data = contentData[id];
    document.getElementById('content-area').innerHTML = `
        <h2 style="color:var(--accent-blue); border-bottom: 2px solid var(--gold-touch); padding-bottom:10px;">${data.title}</h2>
        <p style="font-size:1.15rem; color:#444; margin-top:20px;">${data.text}</p>
        <div style="margin-top:40px; padding:20px; border: 1px dashed #ccc; border-radius:8px; text-align:center;">
            <button class="visual-btn" onclick="loadExternalModel('L' + ${id} + '.html')">Launch Interactive Model →</button>
        </div>
    `;
}

// دالة العرض المركزية (المحرك)
function loadExternalModel(fileName) {
    const area = document.getElementById('content-area');
    area.innerHTML = `
        <iframe src="${fileName}" 
                style="width:100%; height:85vh; border:none; border-radius:10px; background:white;" 
                title="Model View">
        </iframe>
    `;
}


 </script>
</body>
</html>
