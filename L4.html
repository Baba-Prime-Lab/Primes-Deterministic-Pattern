<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Model 4: The Column Fold (Half-Zigzag)</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .grid-container {
            display: grid;
            /* 16 عموداً: مفصلة اليسار + 14 عموداً وسطياً + مفصلة اليمين */
            grid-template-columns: 50px repeat(14, 40px) 50px; 
            background: #fff;
            border: 2px solid #2c3e50;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        .cell {
            width: 100%; height: 38px;
            border: 0.1px solid #f0f0f0;
            display: flex; align-items: center; justify-content: center;
            font-size: 0.85rem; color: #bbb;
        }
        .hinge-col { background-color: #f9f9f9 !important; color: #333 !important; font-weight: bold; border: 1px solid #ddd; }
        .column-head { background-color: #007bff !important; color: white !important; font-weight: bold; }
        .zero-blade { background-color: #000080 !important; color: #fff !important; font-weight: 900; border: 1.5px solid #d4af37; }
    </style>
</head>
<body>

    <h2 style="color:#2c3e50;">4. Half-Inverse Zigzag (The Column Fold)</h2>
    <p>16 Columns | Symmetry at 15-mark intervals</p>
    
    <div id="grid" class="grid-container"></div>

    <script>
        const grid = document.getElementById('grid');
        // رؤوس الأعمدة الثمانية الأصلية لـ p#30
        const colHeads = [1, 7, 11, 13, 17, 19, 23, 29];
        // شفرات زيرو
        const zeroBlades = [2, 3, 5];
        // مفاصل النصف (اليسار ثم اليمين لكل صف)
        const hinges = [0,15, 30,15, 30,45, 60,45, 60,75, 90,75, 90,105, 120,105, 120,135, 150,135];

        for (let r = 0; r < 10; r++) {
            let leftH = hinges[r*2];
            let rightH = hinges[r*2 + 1];

            // 1. مفصلة اليسار
            const lCell = document.createElement('div');
            lCell.className = 'cell hinge-col';
            lCell.innerText = leftH;
            grid.appendChild(lCell);

            // 2. الأعمدة الوسطى الـ 14
            let rowNums = [];
            if (r % 2 === 0) { // اتجاه لليمين
                for (let i = 1; i <= 14; i++) rowNums.push(leftH + i);
            } else { // اتجاه لليسار
                for (let i = 1; i <= 14; i++) rowNums.push(leftH - i);
            }

            rowNums.forEach(num => {
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.innerText = num;

                // منطق التلوين
                let absNum = Math.abs(num);
                let checkVal = absNum % 30;
                if (checkVal === 0 && absNum !== 0) checkVal = 30;

                if (absNum <= 5 && zeroBlades.includes(absNum)) {
                    cell.classList.add('zero-blade');
                } else if (colHeads.includes(checkVal)) {
                    cell.classList.add('column-head');
                }
                grid.appendChild(cell);
            });

            // 3. مفصلة اليمين
            const rCell = document.createElement('div');
            rCell.className = 'cell hinge-col';
            rCell.innerText = rightH;
            grid.appendChild(rCell);
        }
    </script>
</body>
</html>
