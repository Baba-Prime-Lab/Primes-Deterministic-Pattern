<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>GPTC2: Eternal Midpoint Symmetry</title>
    <style>
        :root { 
            --bg: #050a14; --mid-gray: #475569; 
            --glow-2: #00f2ff; --glow-4: #ff007a; --glow-8: #adff2f;
        }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #fff; display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; }
        
        /* تنسيق الهيدر وزر العودة */
        .nav-header { width: 100%; display: flex; justify-content: space-between; align-items: center; max-width: 1100px; margin-bottom: 20px; }
        .back-btn { text-decoration: none; color: var(--glow-2); border: 1px solid var(--glow-2); padding: 8px 15px; border-radius: 6px; font-weight: bold; transition: 0.3s; font-size: 0.9rem; }
        .back-btn:hover { background: var(--glow-2); color: #000; box-shadow: 0 0 10px var(--glow-2); }

        .controls { margin-bottom: 20px; display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; background: rgba(15, 23, 42, 0.9); padding: 15px; border-radius: 12px; border: 1px solid #1e293b; position: sticky; top: 10px; z-index: 1000; }
        .btn-p { padding: 10px 18px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; background: #1e293b; color: #94a3b8; border: 1px solid #334155; transition: 0.3s; }
        .btn-p:hover { border-color: var(--glow-2); color: #fff; }
        .active-btn { background: var(--glow-2) !important; color: #000 !important; box-shadow: 0 0 15px var(--glow-2); border-color: #fff !important; }

        .grid-wrapper { 
            background: #000; border: 3px solid #1e293b; border-radius: 8px; 
            overflow: auto; width: 95vw; height: 70vh;
        }
        .grid-container { display: grid; text-align: center; width: max-content; margin: 0 auto; }
        .cell { border: 0.1px solid #1e293b; display: flex; align-items: center; justify-content: center; font-size: 0.85rem; font-weight: bold; min-width: 65px; height: 45px; }

        .mid-point { background-color: var(--mid-gray) !important; color: white !important; }
        
        @keyframes blink { 0% { opacity: 0.5; } 100% { opacity: 1; box-shadow: inset 0 0 15px; } }
        
        .diff-2 { color: var(--glow-2); animation: blink 0.6s infinite alternate; border: 1px solid var(--glow-2) !important; }
        .diff-4 { color: var(--glow-4); animation: blink 0.8s infinite alternate; border: 1px solid var(--glow-4) !important; }
        .diff-8 { color: var(--glow-8); animation: blink 1s infinite alternate; border: 1px solid var(--glow-8) !important; }

        .label-top { color: #64748b; margin-bottom: 10px; font-size: 1.1rem; }
    </style>
</head>
<body>

    <div class="nav-header">
        <a href="index.html" class="back-btn">← Back to Hub</a>
        <h2 style="color: var(--glow-2); margin: 0;">GPTC2: Eternal Midpoint Symmetry</h2>
    </div>

    <div class="label-top">التمييز للأعمدة المتناظرة حول $P\#/2$</div>

    <div class="controls">
        <button class="btn-p" onclick="buildGrid(6)">6#</button>
        <button class="btn-p" onclick="buildGrid(30)">30#</button>
        <button class="btn-p" onclick="buildGrid(210)">210#</button>
        <button class="btn-p" onclick="buildGrid(2310)">2310#</button>
        <button class="btn-p" onclick="buildGrid(30030)">30030#</button>
        <button class="btn-p" onclick="buildGrid(510510)">510510#</button>
    </div>

    <div class="grid-wrapper" id="wrapper">
        <div id="grid" class="grid-container"></div>
    </div>

    <script>
        function buildGrid(p) {
            const grid = document.getElementById('grid');
            const wrapper = document.getElementById('wrapper');
            grid.innerHTML = "";
            
            // إصلاح مشكلة تداخل إضاءة الأزرار
            document.querySelectorAll('.btn-p').forEach(b => {
                b.classList.remove('active-btn');
                // نتحقق من أن النص داخل الزر يطابق الرقم متبوعاً بـ # بدقة
                if(b.innerText === (p + "#")) b.classList.add('active-btn');
            });

            let midVal = p / 2;
            let displayCols = (p > 30) ? 41 : p; 
            let rows = 40;

            grid.style.gridTemplateColumns = `repeat(${displayCols}, 1fr)`;

            let colStart = (p <= 30) ? 1 : midVal - 20;
            let colEnd = (p <= 30) ? p : midVal + 20;

            for (let r = 0; r < rows; r++) {
                let rowBase = r * p;
                
                for (let v = colStart; v <= colEnd; v++) {
                    let currentNum = rowBase + v;
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    cell.innerText = currentNum;

                    if (v === midVal) {
                        cell.classList.add('mid-point');
                    } 
                    else if (v === midVal - 2 || v === midVal + 2) {
                        cell.classList.add('diff-2');
                    }
                    else if (p > 6 && (v === midVal - 4 || v === midVal + 4)) {
                        cell.classList.add('diff-4');
                    }
                    else if (p > 6 && (v === midVal - 8 || v === midVal + 8)) {
                        cell.classList.add('diff-8');
                    }

                    grid.appendChild(cell);
                }
            }

            setTimeout(() => {
                const center = document.querySelector('.mid-point');
                if (center) {
                    wrapper.scrollLeft = center.offsetLeft - (wrapper.offsetWidth / 2) + (center.offsetWidth / 2);
                }
            }, 50);
        }

        window.onload = () => buildGrid(30);
    </script>
</body>
</html>
